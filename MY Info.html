<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الثقافة العامة - كلية التميز</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }
        .quiz-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 { color: #38bdf8; font-size: 24px; margin-top: 0; }
        p { color: #94a3b8; font-size: 14px; }
        
        .progress-bar {
            background: rgba(255, 255, 255, 0.1);
            height: 8px;
            border-radius: 4px;
            margin: 15px 0 25px;
            overflow: hidden;
        }
        .progress-fill {
            background: #38bdf8;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .q-title { font-size: 18px; margin-bottom: 20px; text-align: right; line-height: 1.5; }
        .opt-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            margin-bottom: 10px;
            font-size: 15px;
            cursor: pointer;
            text-align: right;
            transition: 0.2s;
            display: block;
        }
        .opt-btn:hover { background: rgba(56, 189, 248, 0.3); border-color: #38bdf8; }

        .hidden { display: none !important; }
        
        .prize-box {
            background: linear-gradient(135deg, #16a34a, #22c55e);
            padding: 20px;
            border-radius: 16px;
            margin-top: 15px;
        }
        .btn-action {
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="quiz-card">
    <!-- الشاشة الأولى -->
    <div id="start-screen">
        <h1>🧠 مسابقة الثقافة والتحدي</h1>
        <p>جامعة بغداد - كلية التميز</p>
        <p>أجب على 5 أسئلة سريعة واجمع النقاط للفوز بالجائزة الرمزية! 🎁</p>
        <button class="btn-action" onclick="startQuiz()">ابدأ التحدي الآن 🚀</button>
    </div>

    <!-- شاشة الأسئلة -->
    <div id="quiz-screen" class="hidden">
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        <div class="q-title" id="question-text"></div>
        <div id="options-container"></div>
    </div>

    <!-- شاشة النتيجة -->
    <div id="result-screen" class="hidden">
        <h1>🏆 نتيجة التحدي</h1>
        <p style="font-size: 18px; color: #fff;">مجموع نقاطك: <strong id="score-val" style="color:#38bdf8; font-size: 28px;">0</strong> / 100</p>
        
        <div id="prize-div" class="prize-box hidden">
            <h2 style="margin: 0; font-size: 22px;">🎉 مبروك! لقد فزت! 🎉</h2>
            <p style="color: #f0fdf4; margin-top: 8px;">توجه إلى مسؤول الجناح لاستلام **الجائزة الرمزية** الخاصة بك 🎁</p>
        </div>

        <div id="retry-div" class="hidden">
            <p style="color: #f87171;">أنت قريب جداً! تحتاج إلى 80 نقطة للفوز بالجائزة.</p>
        </div>

        <button class="btn-action" onclick="resetQuiz()">إعادة التحدي 🔄</button>
    </div>
</div>

<script>
    var questions = [
        {
            q: "1️⃣ ما هي البيانات الضخمة (Big Data) ببساطة؟",
            opts: ["ملفات وورد حجمها كبير جداً", "كميات هائلة من المعلومات يتم تحليلها بالذكاء الاصطناعي", "برامج حماية الحاسوب"],
            ans: 1
        },
        {
            q: "2️⃣ أي من العلوم التالية يهتم بدراسة السلوك البشري والمجتمعي؟",
            opts: ["علم الاجتماع (Sociology)", "الهندسة المدنية", "الكيمياء العضوية"],
            ans: 0
        },
        {
            q: "3️⃣ ما هو الهدف الأساسي من نظام التجارة الإلكترونية؟",
            opts: ["طباعة الورق بسرعة", "بيع وشراء المنتجات والخدمات عبر الإنترنت", "تصميم الألعاب فقط"],
            ans: 1
        },
        {
            q: "4️⃣ العبارة الشهيرة 'أنا أفكر، إذن أنا موجود' تعود لأي فيلسوف؟",
            opts: ["سقراط", "رينيه ديكارت", "أرسطو"],
            ans: 1
        },
        {
            q: "5️⃣ ما الذي يُطلق على التطبيقات التي تربط قواعد البيانات بالمستخدمين؟",
            opts: ["نظم المعلومات (Information Systems)", "محركات السيارات", "أجهزة الراديو"],
            ans: 0
        }
    ];

    var currentQ = 0;
    var score = 0;

    function startQuiz() {
        document.getElementById('start-screen').className = 'hidden';
        document.getElementById('quiz-screen').className = '';
        showQuestion();
    }

    function showQuestion() {
        var q = questions[currentQ];
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('progress').style.width = ((currentQ + 1) / questions.length * 100) + '%';

        var container = document.getElementById('options-container');
        container.innerHTML = '';
        
        for (var i = 0; i < q.opts.length; i++) {
            (function(index) {
                var btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = q.opts[index];
                btn.onclick = function() { selectAnswer(index); };
                container.appendChild(btn);
            })(i);
        }
    }

    function selectAnswer(idx) {
        if (idx === questions[currentQ].ans) {
            score += 20;
        }
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').className = 'hidden';
        document.getElementById('result-screen').className = '';
        document.getElementById('score-val').innerText = score;

        if (score >= 80) {
            document.getElementById('prize-div').className = 'prize-box';
            document.getElementById('retry-div').className = 'hidden';
        } else {
            document.getElementById('prize-div').className = 'hidden';
            document.getElementById('retry-div').className = '';
        }
    }

    function resetQuiz() {
        currentQ = 0;
        score = 0;
        document.getElementById('result-screen').className = 'hidden';
        document.getElementById('start-screen').className = '';
    }
</script>

</body>
</html>
