<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عجلة الحظ - كلية التميز</title>
    <style>
        body {
            background: #4d43e8;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
            color: white;
        }
        .wheel-box {
            position: relative;
            width: 320px;
            height: 320px;
            margin-top: 20px;
        }
        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 35px solid #d4af37;
            z-index: 10;
        }
        .outer-rim {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: #113886;
            padding: 12px;
            box-sizing: border-box;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        canvas { width: 100%; height: 100%; border-radius: 50%; }
        .center-circle {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; height: 80px;
            background: #0d2b6b;
            border-radius: 50%;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            border: 3px solid #1e4ea8;
            cursor: pointer;
        }
        button.spin-btn {
            margin-top: 30px;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            background: #ffd700;
            color: #000;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <h2>🎡 عجلة الحظ التفاعلية</h2>
    <div class="wheel-box">
        <div class="pointer"></div>
        <div class="outer-rim">
            <canvas id="wheel" width="300" height="300"></canvas>
        </div>
        <div class="center-circle" onclick="spin()">SPIN</div>
    </div>
    <button class="spin-btn" onclick="spin()">دَوّر العجلة 🚀</button>

<script>
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const colors = ['#e91e63', '#9c27b0', '#ff9800', '#4caf50', '#00bcd4'];
    const labels = ['سؤال 1', 'سؤال 2', 'سؤال 3', 'سؤال 4', 'سؤال 5'];
    let currentAngle = 0;

    function drawWheel() {
        const numSectors = 5;
        const arc = (2 * Math.PI) / numSectors;
        for (let i = 0; i < numSectors; i++) {
            const angle = currentAngle + i * arc;
            ctx.beginPath();
            ctx.fillStyle = colors[i];
            ctx.moveTo(150, 150);
            ctx.arc(150, 150, 150, angle, angle + arc);
            ctx.lineTo(150, 150);
            ctx.fill();
        }
    }
    drawWheel();

    function spin() {
        let rotation = Math.floor(Math.random() * 360) + 1440;
        let start = null;
        function animate(timestamp) {
            if (!start) start = timestamp;
            let progress = timestamp - start;
            if (progress < 3000) {
                currentAngle += (rotation / 200) * (Math.PI / 180);
                drawWheel();
                requestAnimationFrame(animate);
            }
        }
        requestAnimationFrame(animate);
    }
</script>
</body>
</html>
